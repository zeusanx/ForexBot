# Server
server.port=8080
server.servlet.context-path=/api

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:forexdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Twelvedata API ──────────────────────────────────────────────────────────
# Get your FREE key at https://twelvedata.com (800 calls/day)
# Replace below with your actual key to get REAL EUR/USD prices
forex.api.key=9f9f1aec01af46f6a2ceabb479a1c0fd
forex.default.pair=EUR/USD

# ── EMA Strategy ───────────────────────────────────────────────────────────
strategy.ema.short-period=9
strategy.ema.long-period=21

# ── Bot Scheduler ──────────────────────────────────────────────────────────
# 60 seconds = safe for Twelvedata free tier (800 calls/day)
# Set to 30000 (30s) for faster testing with mock data
bot.scheduler.interval=60000

# ── Mock Broker ────────────────────────────────────────────────────────────
broker.initial.balance=10000.00
broker.trade.lot-size=1000
# Spread in price units (0.0002 = 2 pips for EUR/USD)
broker.spread=0.0002

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.forexbot=INFO
logging.level.org.springframework.web=WARN
